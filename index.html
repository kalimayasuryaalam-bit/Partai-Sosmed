<!DOCTYPE html>
<html lang="id" data-theme="pink">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SosialHub - Dasbor Agensi Super</title>
    
    <!-- Tailwind CSS (CDN) -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Lucide Icons -->

    <!-- FontAwesome Brands -->

    <!-- Google Fonts: Plus Jakarta Sans -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

    <style>
        /* TEMA WARNA */

            --color-brand-50: 253 242 248; --color-brand-100: 252 231 243; --color-brand-200: 251 207 232;

        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['"Plus Jakarta Sans"', 'sans-serif'] },
                    colors: {
                        brand: { 50: 'rgb(var(--color-brand-50))', 100: 'rgb(var(--color-brand-100))', 200: 'rgb(var(--color-brand-200))', 300: 'rgb(var(--color-brand-300))', 400: 'rgb(var(--color-brand-400))', 500: 'rgb(var(--color-brand-500))', 600: 'rgb(var(--color-brand-600))', 900: 'rgb(var(--color-brand-900))' },
                        accent: { 400: 'rgb(var(--color-accent-400))' }
                    },
                    animation: { 'fade-in': 'fadeIn 0.4s cubic-bezier(0.4, 0, 0.2, 1) forwards', 'slide-up': 'slideUp 0.4s cubic-bezier(0.4, 0, 0.2, 1) forwards' },
                    keyframes: { fadeIn: { '0%': { opacity: '0' }, '100%': { opacity: '1' } }, slideUp: { '0%': { opacity: '0', transform: 'translateY(20px)' }, '100%': { opacity: '1', transform: 'translateY(0)' } } }
                }
            }

    </script>

    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: linear-gradient(135deg, rgb(var(--color-brand-50)) 0%, rgb(var(--color-brand-100)) 100%); background-image: radial-gradient(rgba(var(--color-brand-500), 0.3) 2px, transparent 2px); background-size: 32px 32px; background-attachment: fixed; transition: background 0.5s ease; }
        ::-webkit-scrollbar { width: 8px; } ::-webkit-scrollbar-track { background: transparent; } ::-webkit-scrollbar-thumb { background: rgb(var(--color-brand-400)); border-radius: 20px; transition: background 0.3s;} ::-webkit-scrollbar-thumb:hover { background: rgb(var(--color-brand-500)); }
        .glass { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(24px); border: 3px solid rgb(var(--color-brand-200)); box-shadow: 0 15px 35px -5px rgba(var(--color-brand-500), 0.2); transition: border-color 0.5s ease, box-shadow 0.5s ease; }
        .color-fb { color: #1877F2; } .bg-fb { background-color: #1877F2; color: #ffffff;} .color-tw { color: #000000; } .bg-tw { background-color: #000000; color: #ffffff;} .color-ig { background: radial-gradient(circle at 30% 107%, #fdf497 0%, #fdf497 5%, #fd5949 45%,#d6249f 60%,#285AEB 90%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; } .bg-ig { background: radial-gradient(circle at 30% 107%, #fdf497 0%, #fdf497 5%, #fd5949 45%,#d6249f 60%,#285AEB 90%); color: #ffffff;} .color-li { color: #0A66C2; } .bg-li { background-color: #0A66C2; color: #ffffff;} .color-yt { color: #FF0000; } .bg-yt { background-color: #FF0000; color: #ffffff;} .color-tk { color: #000000; } .bg-tk { background-color: #000000; color: #ffffff;} .color-wa { color: #25D366; } .bg-wa { background-color: #25D366; color: #ffffff;} .color-tg { color: #24A1DE; } .bg-tg { background-color: #24A1DE; color: #ffffff;} .color-pt { color: #E60023; } .bg-pt { background-color: #E60023; color: #ffffff;} .color-th { color: #000000; } .bg-th { background-color: #000000; color: #ffffff;}
        .btn-smooth:active { transform: scale(0.95); transition: transform 0.1s; }
        #toast-container { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); z-index: 9999; display: flex; flex-direction: column; gap: 10px; pointer-events: none; }
        .toast { padding: 12px 24px; border-radius: 50px; color: white; font-weight: 800; font-size: 14px; box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.2); animation: slideDownToast 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55) forwards, fadeOutToast 0.4s 3.5s forwards; pointer-events: auto; border: 2px solid rgba(255,255,255,0.2); }
        @keyframes slideDownToast { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } } @keyframes fadeOutToast { from { opacity: 1; transform: translateY(0); } to { opacity: 0; transform: translateY(-20px); } }
    </style>
</head>
<body class="flex h-screen overflow-hidden text-slate-800 selection:bg-brand-200 selection:text-brand-900">

    <div id="toast-container"></div>

    <!-- Halaman Login -->
    <div id="login-screen" class="fixed inset-0 z-[100] flex items-center justify-center bg-gradient-to-br from-brand-50 to-brand-200 transition-opacity duration-500">
        <div class="absolute inset-0 bg-[radial-gradient(rgba(var(--color-brand-500),0.1)_2px,transparent_2px)] [background-size:32px_32px]"></div>
        
        <div class="glass w-full max-w-md p-8 md:p-10 rounded-[2.5rem] relative z-10 shadow-2xl border-4 border-white mx-4 flex flex-col justify-center items-center" id="login-card">
            
            <!-- Loading Indicator Awal -->
            <div id="auth-loading" class="text-center w-full py-10">
                <i class="fa-solid fa-circle-notch fa-spin text-brand-500 text-4xl mb-4"></i>

            </div>

            <!-- Form Otentikasi (Sembunyi saat loading) -->
            <div id="auth-forms" class="w-full hidden animate-slide-up">
                <div class="text-center mb-8">
                    <div class="inline-flex items-center justify-center w-16 h-16 bg-gradient-to-tr from-brand-500 to-accent-400 rounded-2xl text-white shadow-lg mb-4 rotate-3">
                        <i data-lucide="sparkles" class="w-8 h-8"></i>
                    </div>
                    <h2 id="auth-title" class="text-3xl font-black text-brand-900 tracking-tight mb-2">Selamat Datang</h2>
                    <p id="auth-subtitle" class="text-brand-600 font-bold">Pintu masuk ke SosialHub</p>
                </div>

                <!-- CONTAINER LOGIN -->
                <div id="view-login">
                    <div class="flex bg-brand-100 p-1 rounded-2xl mb-6 relative">
                        <div id="login-slider" class="absolute w-1/2 h-[calc(100%-8px)] bg-white rounded-xl shadow-sm top-1 left-0 border-4 border-transparent bg-clip-padding transition-transform duration-300 transform translate-x-0"></div>
                        <button onclick="switchLoginRole('admin')" type="button" class="flex-1 py-3 text-sm font-black z-10 text-brand-900 transition-colors" id="btn-role-admin">Admin Agensi</button>
                        <button onclick="switchLoginRole('client')" type="button" class="flex-1 py-3 text-sm font-black z-10 text-brand-500 transition-colors" id="btn-role-client">Klien Pengguna</button>
                    </div>

                    <form onsubmit="handleLogin(event)" class="space-y-4">
                        <div>
                            <div class="relative">
                                <i data-lucide="mail" class="absolute left-4 top-3.5 w-5 h-5 text-brand-400"></i>
                                <input type="email" id="login-email" required class="w-full bg-white/80 border-4 border-brand-100 rounded-2xl py-3 pl-12 pr-4 focus:border-brand-500 focus:bg-white outline-none font-bold text-brand-900 placeholder-brand-400" placeholder="Email Anda">
                            </div>
                        </div>
                        <div>
                            <div class="relative">
                                <i data-lucide="lock" class="absolute left-4 top-3.5 w-5 h-5 text-brand-400"></i>
                                <input type="password" id="login-password" required class="w-full bg-white/80 border-4 border-brand-100 rounded-2xl py-3 pl-12 pr-4 focus:border-brand-500 focus:bg-white outline-none font-bold text-brand-900 placeholder-brand-400" placeholder="Kata Sandi">
                            </div>
                        </div>
                        <div class="pt-2">
                            <button id="submit-login" type="submit" class="w-full bg-gradient-to-r from-brand-500 to-accent-400 text-white font-black text-lg py-4 rounded-2xl shadow-[0_10px_25px_rgba(var(--color-brand-500),0.4)] hover:from-brand-600 transition-all btn-smooth flex justify-center items-center gap-2">
                                Masuk Dasbor <i data-lucide="arrow-right" class="w-5 h-5"></i>
                            </button>
                        </div>
                    </form>
                    
                    <div class="relative flex py-5 items-center">
                        <div class="flex-grow border-t-2 border-brand-100"></div>
                        <span class="flex-shrink-0 mx-4 text-brand-400 text-sm font-extrabold">ATAU</span>
                        <div class="flex-grow border-t-2 border-brand-100"></div>
                    </div>
                    
                    <button type="button" onclick="handleGoogleAuth()" class="w-full bg-white text-slate-700 font-extrabold text-lg py-3.5 rounded-2xl shadow-sm border-4 border-slate-100 hover:bg-slate-50 hover:border-slate-200 transition-all btn-smooth flex justify-center items-center gap-3">
                        <i class="fa-brands fa-google text-rose-500 text-xl"></i> Masuk dengan Google
                    </button>

                    <p class="text-center mt-6 text-sm font-extrabold text-brand-600">Belum punya akun? <button type="button" onclick="toggleAuthView('register')" class="text-brand-900 font-black hover:underline focus:outline-none">Daftar sekarang</button></p>
                </div>

                <!-- CONTAINER REGISTER -->
                <div id="view-register" class="hidden">
                    <form onsubmit="handleRegister(event)" class="space-y-4">
                        <div class="relative"><i data-lucide="user" class="absolute left-4 top-3.5 w-5 h-5 text-brand-400"></i><input type="text" id="register-name" required class="w-full bg-white/80 border-4 border-brand-100 rounded-2xl py-3 pl-12 pr-4 focus:border-brand-500 focus:bg-white outline-none font-bold text-brand-900 placeholder-brand-400" placeholder="Nama Bisnis"></div>
                        <div class="relative"><i data-lucide="mail" class="absolute left-4 top-3.5 w-5 h-5 text-brand-400"></i><input type="email" id="register-email" required class="w-full bg-white/80 border-4 border-brand-100 rounded-2xl py-3 pl-12 pr-4 focus:border-brand-500 focus:bg-white outline-none font-bold text-brand-900 placeholder-brand-400" placeholder="Email Baru"></div>
                        <div class="relative"><i data-lucide="lock" class="absolute left-4 top-3.5 w-5 h-5 text-brand-400"></i><input type="password" id="register-password" required class="w-full bg-white/80 border-4 border-brand-100 rounded-2xl py-3 pl-12 pr-4 focus:border-brand-500 focus:bg-white outline-none font-bold text-brand-900 placeholder-brand-400" placeholder="Sandi Min. 6 Karakter"></div>
                        <div class="pt-2"><button id="submit-register" type="submit" class="w-full bg-slate-900 text-white font-black text-lg py-4 rounded-2xl hover:bg-brand-500 transition-all btn-smooth">Buat Akun Gratis</button></div>
                    </form>

                    <div class="relative flex py-5 items-center"><div class="flex-grow border-t-2 border-brand-100"></div><span class="flex-shrink-0 mx-4 text-brand-400 text-sm font-extrabold">ATAU</span><div class="flex-grow border-t-2 border-brand-100"></div></div>

                    <button type="button" onclick="handleGoogleAuth()" class="w-full bg-white text-slate-700 font-extrabold text-lg py-3.5 rounded-2xl shadow-sm border-4 border-slate-100 hover:bg-slate-50 transition-all btn-smooth flex justify-center items-center gap-3">
                        <i class="fa-brands fa-google text-rose-500 text-xl"></i> Daftar dengan Google
                    </button>

                    <p class="text-center mt-6 text-sm font-extrabold text-brand-600">Sudah punya akun? <button type="button" onclick="toggleAuthView('login')" class="text-brand-900 font-black hover:underline focus:outline-none">Masuk di sini</button></p>
                </div>
            </div>
        </div>
    </div>

    <!-- Sidebar Desktop -->
    <aside class="w-72 glass hidden md:flex flex-col h-full z-20 border-r-4 border-brand-200 flex-shrink-0 relative">
        <div class="p-8 pb-6 flex items-center gap-4">
            <div class="bg-gradient-to-tr from-brand-500 to-accent-400 p-3 rounded-[1.2rem] text-white shadow-lg shadow-brand-500/40 rotate-3 transition-colors duration-500"><i data-lucide="sparkles" class="w-6 h-6"></i></div>
            <span class="font-black text-3xl tracking-tight text-brand-900">SosialHub</span>
        </div>
        <nav class="p-5 flex-1 space-y-2 overflow-y-auto" id="nav-menu"></nav>
        <div class="p-5 border-t-4 border-brand-100 space-y-2" id="nav-footer"></div>
    </aside>

    <main class="flex-1 flex flex-col min-h-screen w-full relative">
        <!-- Mobile Header -->
        <div class="md:hidden glass border-b-4 border-brand-200 p-4 flex items-center justify-between z-20 relative">
            <div class="flex items-center gap-3"><div class="bg-gradient-to-tr from-brand-500 to-accent-400 p-2.5 rounded-xl text-white shadow-sm"><i data-lucide="sparkles" class="w-5 h-5"></i></div></div>
            <div class="flex-1 px-4">
                <div class="relative">
                    <div id="mobile-client-lock-icon" class="hidden absolute left-3 top-2.5 z-10 text-slate-400"><i data-lucide="lock" class="w-4 h-4"></i></div>
                    <select id="mobile-company-selector" onchange="changeCompany(this.value)" class="w-full bg-white border-4 border-brand-200 text-brand-700 font-black text-sm rounded-2xl py-2 px-3 outline-none appearance-none text-center shadow-sm"></select>
                </div>
            </div>
        </div>

        <!-- Top Header Desktop -->
        <header class="h-24 glass border-b-4 border-brand-200 hidden md:flex items-center justify-between px-10 z-10">
            <div class="flex items-center gap-8">
                <h1 id="header-title" class="text-3xl font-black text-brand-900 tracking-tight drop-shadow-sm">Ruang Kendali</h1>
                <div class="flex items-center border-l-4 border-brand-200 pl-8">
                    <div class="relative group">
                        <!-- Indikator Gembok untuk Klien -->
                        <div id="client-lock-icon" class="hidden absolute left-4 top-3.5 z-10 text-slate-400"><i data-lucide="lock" class="w-4 h-4"></i></div>
                        <select id="company-selector" onchange="changeCompany(this.value)" class="appearance-none bg-white hover:bg-brand-50 border-4 border-brand-200 text-brand-800 font-black text-sm rounded-[1.5rem] focus:ring-4 focus:border-brand-500 block py-3 pl-5 pr-12 outline-none cursor-pointer transition-all shadow-[0_4px_10px_rgba(var(--color-brand-500),0.1)] hover:shadow-brand-500/20"></select>
                        <i data-lucide="chevron-down" id="company-chevron" class="w-5 h-5 absolute right-4 top-3.5 text-brand-400 group-hover:text-brand-600 transition-colors pointer-events-none"></i>
                    </div>
                </div>
            </div>

            <div class="flex items-center gap-5">
                <button onclick="showToast('Semua sistem optimal!', 'info')" class="w-14 h-14 bg-white rounded-full flex items-center justify-center text-brand-400 hover:text-brand-600 border-4 border-brand-200 shadow-sm relative btn-smooth"><i data-lucide="bell" class="w-6 h-6"></i><span class="absolute top-2 right-2 w-3.5 h-3.5 bg-accent-400 rounded-full border-2 border-white"></span></button>
                <div class="h-14 w-14 bg-gradient-to-tr from-brand-200 to-accent-100 text-brand-800 rounded-full flex items-center justify-center font-black text-xl border-4 border-white shadow-md btn-smooth">U</div>
            </div>
        </header>

        <div id="main-content" class="p-4 md:p-10 flex-1 overflow-y-auto pb-28 md:pb-10"></div>
    </main>

    <nav class="md:hidden glass border-t-4 border-brand-200 fixed bottom-0 w-full z-50 px-2 py-3 flex justify-between items-center pb-safe" id="mobile-nav"></nav>

    <!-- Facebook SDK -->
    <script>
        window.fbAsyncInit = function() { FB.init({ appId: 'MASUKKAN_APP_ID', cookie: true, xfbml: true, version: 'v19.0' }); };
        (function(d, s, id){ var js, fjs = d.getElementsByTagName(s)[0]; if (d.getElementById(id)) {return;} js = d.createElement(s); js.id = id; js.src = "https://connect.facebook.net/id_ID/sdk.js"; fjs.parentNode.insertBefore(js, fjs); }(document, 'script', 'facebook-jssdk'));
    </script>

    <!-- FIREBASE INTEGRATION MODULE -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, updateProfile, signOut, GoogleAuthProvider, signInWithPopup, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Konfigurasi Database Anda
        const firebaseConfig = { 
            apiKey: "AIzaSyCGs467Wb2uZfdFReMi2gjoa-77HXiEpdQ", 
            authDomain: "market-place-kalimaja.firebaseapp.com", 
            projectId: "market-place-kalimaja", 
            storageBucket: "market-place-kalimaja.firebasestorage.app", 
            messagingSenderId: "58576818321", 
            appId: "1:58576818321:web:b4eb5d25413a8b14776f30" 
        };
        const app = initializeApp(firebaseConfig);
        
        // Ekspor ke window global untuk diakses oleh script utama
        window.firebaseAuth = { auth: getAuth(app), signInWithEmailAndPassword, createUserWithEmailAndPassword, updateProfile, signOut, GoogleAuthProvider, signInWithPopup, onAuthStateChanged };
        window.firebaseDb = { db: getFirestore(app), doc, setDoc, getDoc };
    </script>

    <!-- MAIN LOGIC (Dengan Perbaikan Anti-Blank) -->
    <script>
        // Set tema tersimpan
        const savedTheme = localStorage.getItem('sosialhub-theme') || 'pink';
        document.documentElement.setAttribute('data-theme', savedTheme);

        let activeTab = localStorage.getItem('sosialhub-activeTab') || 'dashboard';
        let currentCompanyId = localStorage.getItem('sosialhub-companyId') || 'klien1';
        let loginRole = localStorage.getItem('sosialhub-role') || 'admin';
        let attachedMedia = false; 
        
        let database = {
            klien1: { name: '🏢 Perusahaan Pribadi', accounts: { facebook: 1, instagram: 1, linkedin: 1, tiktok: 1 }, feed: [], scheduled: [] },
            klien2: { name: '🍔 Klien Restoran', accounts: { facebook: 3, twitter: 1, instagram: 2, tiktok: 1, whatsapp: 1 }, feed: [], scheduled: [] }
        };

        // --- FIX ANTI BLANK SCREEN ---
        // Kita gunakan poling (mengecek berkala) memastikan Firebase sudah siap dimuat dari Module
        window.onload = () => {
            const checkFirebase = setInterval(() => {
                if (window.firebaseAuth && window.firebaseDb) {
                    clearInterval(checkFirebase);
                    
                    // Hilangkan indikator loading, tampilkan form
                    document.getElementById('auth-loading').classList.add('hidden');
                    document.getElementById('auth-forms').classList.remove('hidden');

                    // ON AUTH STATE CHANGED (Solusi Permanen untuk Sesi!)
                    window.firebaseAuth.onAuthStateChanged(window.firebaseAuth.auth, async (user) => {
                        const loginScreen = document.getElementById('login-screen');
                        
                        if (user) {
                            // PENGGUNA SUDAH MASUK (LOGIN)
                            // 1. Ambil data dari Firestore
                            try {
                                const { db, doc, getDoc } = window.firebaseDb;
                                const docSnap = await getDoc(doc(db, "agensi_data", user.uid));
                                if (docSnap.exists()) {
                                    database = docSnap.data().data_klien;
                                }
                            } catch(e) { console.error("Data tidak ditemukan, memakai default.", e); }

                            // 2. Sembunyikan Layar Login
                            loginScreen.classList.add('opacity-0'); 
                            setTimeout(() => {
                                loginScreen.style.display = 'none'; 
                                applyRoleBasedAccess(); // Kunci/Buka Akses Sesuai Role
                                init(); // RENDER DASBOR (Mencegah Blank Screen)
                            }, 500);
                        } else {
                            // PENGGUNA BELUM MASUK (Tampilkan Layar Login)
                            loginScreen.style.display = 'flex';
                            setTimeout(() => { loginScreen.classList.remove('opacity-0'); }, 50);
                        }
                    });
                }
            }, 50); // Mengecek setiap 50 milidetik
        };

        // Fungsi Pembatasan Akses Admin vs Klien
        function applyRoleBasedAccess() {
            const selDesktop = document.getElementById('company-selector');
            const selMobile = document.getElementById('mobile-company-selector');
            const lockIcon = document.getElementById('client-lock-icon');
            const mobLockIcon = document.getElementById('mobile-client-lock-icon');
            const chevronIcon = document.getElementById('company-chevron');

            if(loginRole === 'client') {
                // Kunci Dropdown untuk Klien
                changeCompany(Object.keys(database)[0]);
                selDesktop.disabled = true; selMobile.disabled = true;
                selDesktop.classList.add('bg-slate-50', 'text-slate-500', 'border-slate-200', 'pl-10'); 
                selDesktop.classList.remove('hover:bg-brand-50', 'cursor-pointer');
                selMobile.classList.add('bg-slate-50', 'text-slate-500', 'pl-8');
                
                lockIcon.classList.remove('hidden'); mobLockIcon.classList.remove('hidden');
                chevronIcon.classList.add('hidden');
                
                // Alihkan tab otomatis jika klien mencoba mengakali url ke menu billing
                if(activeTab === 'billing') activeTab = 'dashboard';
            } else {
                // Buka Kendali untuk Admin
                selDesktop.disabled = false; selMobile.disabled = false;
                selDesktop.classList.remove('bg-slate-50', 'text-slate-500', 'border-slate-200', 'pl-10');
                selDesktop.classList.add('hover:bg-brand-50', 'cursor-pointer');
                selMobile.classList.remove('bg-slate-50', 'text-slate-500', 'pl-8');
                
                lockIcon.classList.add('hidden'); mobLockIcon.classList.add('hidden');
                chevronIcon.classList.remove('hidden');
            }
        }

        async function saveToFirestore() {
            if (!window.firebaseAuth?.auth?.currentUser) return;
            try { await window.firebaseDb.setDoc(window.firebaseDb.doc(window.firebaseDb.db, "agensi_data", window.firebaseAuth.auth.currentUser.uid), { data_klien: database }); } catch(e) {}
        }

        function toggleAuthView(view) {
            const loginView = document.getElementById('view-login'), registerView = document.getElementById('view-register');
            const title = document.getElementById('auth-title'), subtitle = document.getElementById('auth-subtitle');
            if (view === 'register') { 
                loginView.classList.add('hidden'); registerView.classList.remove('hidden'); 
                title.innerText = 'Buat Akun'; subtitle.innerText = 'Mulai perjalanan Agensi Anda';
            } else { 
                registerView.classList.add('hidden'); loginView.classList.remove('hidden'); 
                title.innerText = 'Selamat Datang'; subtitle.innerText = 'Pintu masuk ke SosialHub';
            }
        }

        function switchLoginRole(role) {

            try {
                localStorage.setItem('sosialhub-role', loginRole); // Simpan pilihan role
                await window.firebaseAuth.signInWithEmailAndPassword(window.firebaseAuth.auth, document.getElementById('login-email').value, document.getElementById('login-password').value);
                showToast(`Berhasil Masuk! Memuat dasbor... 🎉`, 'success');
                // Tidak perlu hide secara manual, karena onAuthStateChanged akan menanganinya di atas!
            } catch (err) { 
                showToast("Gagal Masuk! Cek email/sandi.", 'error'); 
                btn.innerHTML = 'Masuk Dasbor <i data-lucide="arrow-right" class="w-5 h-5"></i>'; btn.classList.remove('pointer-events-none'); 
            }
        }

        async function handleRegister(e) {
            e.preventDefault(); const btn = document.getElementById('submit-register'); btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> Mendaftarkan...'; btn.classList.add('pointer-events-none');
            try {
                const cred = await window.firebaseAuth.createUserWithEmailAndPassword(window.firebaseAuth.auth, document.getElementById('register-email').value, document.getElementById('register-password').value);
                await window.firebaseAuth.updateProfile(cred.user, { displayName: document.getElementById('register-name').value });
                await window.firebaseDb.setDoc(window.firebaseDb.doc(window.firebaseDb.db, "agensi_data", cred.user.uid), { data_klien: database });
                showToast('Akun dibuat! Silakan masuk.', 'success'); toggleAuthView('login');
            } catch (err) { 
                showToast("Gagal Mendaftar! Email mungkin sudah terpakai.", 'error'); 
                btn.innerHTML = 'Buat Akun Gratis <i data-lucide="user-plus" class="w-5 h-5"></i>'; btn.classList.remove('pointer-events-none');

            document.getElementById('nav-menu').innerHTML = ''; document.getElementById('nav-footer').innerHTML = '';

            visibleTabs.forEach(t => {

        function handlePost(isSchedule = false) {
            const text = document.getElementById('post-textarea').value;
            if (!text.trim() && !attachedMedia) return showToast('Ketik sesuatu atau lampirkan media dulu ya! 😅', 'warning');

            const currentData = database[currentCompanyId];
            const activePlatforms = Object.keys(currentData.accounts).filter(k => currentData.accounts[k] > 0);
            
            if (activePlatforms.length === 0) return showToast('Belum ada akun tersambung. Ke menu Integrasi dulu yuk!', 'error');

            if (isSchedule) {
                showToast('Masuk ke antrean jadwal! 🗓️', 'success');
                currentData.scheduled.unshift({ id: Date.now(), platform: activePlatforms[0], text: text || 'Postingan Media', time: 'Besok' });
                saveToFirestore();
            } else {
                showToast('Menerbangkan postingan... 🚀', 'info');
                setTimeout(() => {
                    activePlatforms.forEach(plat => {
                        currentData.feed.unshift({ id: Date.now() + Math.random(), platform: plat, text: text, media: attachedMedia, time: 'Baru saja', status: 'Mengudara' });
                    });
                    attachedMedia = false; 
                    saveToFirestore(); 
                    showToast(`Sukses diposting ke ${activePlatforms.length} platform! 🎉`, 'success');
                    renderApp();
                }, 800);
            }
            if(!isSchedule) renderApp();
        }

        function simulateOAuth(platform) {
            const btn = document.getElementById(`btn-connect-${platform}`);
            if(btn) { btn.innerHTML = `<i class="fa-solid fa-circle-notch fa-spin"></i>`; btn.classList.add('pointer-events-none'); }

            if (platform === 'facebook' && typeof FB !== 'undefined') {
                FB.login(function(response) {
                    if (response.authResponse) {
                        database[currentCompanyId].accounts[platform] = (database[currentCompanyId].accounts[platform] || 0) + 1;
                        saveToFirestore(); showToast(`Akun FB terhubung resmi. 🔗`, 'success'); renderApp();
                    } else { showToast('Otorisasi dibatalkan.', 'warning'); renderApp(); }
                }, {scope: 'public_profile,pages_manage_posts'}); 
            } else {
                setTimeout(() => {
                    database[currentCompanyId].accounts[platform] = (database[currentCompanyId].accounts[platform] || 0) + 1;
                    saveToFirestore(); showToast(`Akun ${platformConfig[platform].name} terhubung. 🔗`, 'success'); renderApp();
                }, 1000);
            }
        }

            database[currentCompanyId].accounts[platform] = 0; saveToFirestore();

                <div class="bg-gradient-to-r from-brand-600 to-brand-400 p-8 rounded-[2.5rem] mb-8 text-white shadow-lg flex flex-col md:flex-row items-center justify-between gap-6 border-4 border-white relative overflow-hidden">
                    <div class="absolute -right-10 -top-10 opacity-20"><i data-lucide="wand-2" class="w-48 h-48"></i></div>
                    <div class="flex items-center gap-5 relative z-10">
                        <div class="bg-white/20 p-3 md:p-4 rounded-2xl backdrop-blur-sm flex-shrink-0"><i data-lucide="wand-2" class="w-8 h-8"></i></div>
                        <div><h3 class="text-2xl font-black mb-1">Magic Link Klien ✨</h3><p class="font-bold text-brand-50 text-sm md:text-base">Kirim link ini ke klien. Mereka bisa sambung akun sendiri tanpa perlu kasih password!</p></div>
                    </div>
                    <button onclick="showToast('Link disalin! 📋', 'success')" class="bg-white text-brand-700 px-6 py-3.5 rounded-2xl font-black hover:scale-105 transition-transform btn-smooth relative z-10 w-full md:w-auto"><i data-lucide="copy" class="w-5 h-5 inline mr-2"></i> Salin Link</button>
                </div>` : '';

            return `
                <div class="animate-fade-in">
                    ${magicLink}
                    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
                        ${Object.keys(platformConfig).map(plat => {
                            const cfg = platformConfig[plat], count = accs[plat] || 0, isConn = count > 0;
                            return `
                                <div class="bg-white p-6 rounded-[2.5rem] border-4 ${isConn ? 'border-brand-400 shadow-[0_10px_20px_-10px_rgba(var(--color-brand-500),0.3)]' : 'border-brand-100'} flex flex-col items-center text-center relative overflow-hidden group hover:-translate-y-1 transition-all duration-300">
                                    ${isConn ? `<div class="absolute -right-4 -top-4 w-24 h-24 ${cfg.bgClass} opacity-20 rounded-full group-hover:scale-150 transition-transform duration-500"></div>` : ''}
                                    <div class="w-20 h-20 ${isConn ? cfg.bgClass : 'bg-slate-100 text-slate-400'} rounded-3xl flex items-center justify-center text-4xl shadow-lg mb-4 border-4 border-white transition-all relative z-10"><i class="${cfg.icon}"></i></div>
                                    <h3 class="font-black text-xl text-brand-900 mb-1 relative z-10">${cfg.name}</h3>
                                    ${isConn ? `<p class="text-sm font-black text-emerald-600 bg-emerald-50 px-4 py-1.5 rounded-full mb-4 border-2 border-emerald-100 relative z-10">${count} Tersambung ✅</p>
                                        <div class="w-full flex gap-2 relative z-10"><button onclick="simulateOAuth('${plat}')" class="flex-1 py-3 bg-brand-50 text-brand-700 font-black rounded-xl hover:bg-brand-100 border-2 border-brand-200 btn-smooth">+ Tambah</button><button onclick="removeAccount('${plat}')" class="flex-1 py-3 bg-white text-rose-500 font-black rounded-xl hover:bg-rose-500 hover:text-white border-2 border-rose-100 btn-smooth">Putus</button></div>` 
                                    : `<p class="text-sm font-bold text-slate-400 bg-slate-50 px-4 py-1.5 rounded-full mb-4 border-2 border-slate-100 relative z-10">Belum Terhubung</p>
                                        <button onclick="simulateOAuth('${plat}')" class="w-full py-3.5 bg-slate-800 text-white font-black rounded-xl hover:bg-brand-500 relative z-10 btn-smooth">Hubungkan</button>`}
                                </div>`;
                        }).join('')}
                    </div>
                </div>`;
        }

        function getBillingHTML() {
            return `
                <div class="animate-fade-in flex flex-col items-center justify-center mt-4">
                    <div class="bg-gradient-to-br from-brand-600 to-accent-400 p-2 rounded-[3rem] shadow-[0_20px_50px_-15px_rgba(var(--color-brand-600),0.5)] max-w-lg w-full relative">
                        <div class="absolute -top-6 left-1/2 -translate-x-1/2 bg-slate-900 text-white px-6 py-2 rounded-full font-black tracking-widest uppercase text-sm border-4 border-white shadow-md">Satu-Satunya Paket</div>
                        <div class="bg-white p-10 pt-12 rounded-[2.6rem] text-center h-full flex flex-col items-center relative overflow-hidden">
                            <div class="w-24 h-24 bg-brand-50 text-brand-600 rounded-full flex items-center justify-center mb-6 shadow-inner border-4 border-brand-100 relative z-10"><i data-lucide="crown" class="w-12 h-12"></i><div class="absolute top-0 right-0 w-6 h-6 bg-accent-400 rounded-full border-2 border-white animate-ping"></div></div>
                            <h2 class="text-4xl font-black text-brand-900 mb-2 relative z-10">Paket Agensi PRO 🔥</h2>
                            <p class="text-brand-600 font-extrabold text-lg mb-8 relative z-10">Satu harga. Tanpa batas. Tanpa pusing.</p>
                            <div class="bg-slate-50 w-full p-6 rounded-3xl border-4 border-slate-100 mb-8 relative z-10 hover:border-brand-300 transition-colors"><h3 class="text-5xl font-black text-slate-800 mb-1">Rp 150<span class="text-2xl text-slate-400">.000</span></h3><p class="text-slate-500 font-black uppercase tracking-wider text-sm">Per Bulan</p></div>
                            <ul class="text-left space-y-4 mb-10 w-full px-2 relative z-10">
                                <li class="flex items-center gap-4 font-extrabold text-slate-700 text-lg"><i data-lucide="check-circle-2" class="w-7 h-7 text-brand-500 flex-shrink-0"></i> Unlimited Akun Medsos</li>
                                <li class="flex items-center gap-4 font-extrabold text-slate-700 text-lg"><i data-lucide="check-circle-2" class="w-7 h-7 text-brand-500 flex-shrink-0"></i> Kelola Unlimited Klien</li>
                            </ul>
                            <button onclick="showToast('Mengarahkan ke pembayaran... 💳', 'info')" class="w-full py-4 bg-slate-900 text-white font-black text-xl rounded-2xl hover:bg-brand-500 transition-all btn-smooth relative z-10">Mulai Langganan</button>
                        </div>
                    </div>
                </div>`;
        }

        function getSettingsHTML() {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            const formTambahKlien = loginRole === 'admin' ? `
                <div class="bg-white p-6 rounded-3xl border-4 border-brand-100 mb-6">
                    <h3 class="font-extrabold text-xl mb-2 text-slate-800">Tambah Ruang Klien Baru</h3>
                    <div class="flex gap-3"><input type="text" id="new-client-name" class="flex-1 bg-brand-50 border-4 border-brand-100 rounded-2xl px-4 py-3 font-bold text-brand-900 outline-none focus:border-brand-500" placeholder="Nama Klien..."><button onclick="createNewClient()" class="bg-brand-900 text-white px-6 py-3 rounded-2xl font-bold hover:bg-brand-500 btn-smooth">Buat Ruang</button></div>
                </div>` : `<div class="bg-brand-50 p-6 rounded-3xl border-2 border-dashed border-brand-200 mb-6 text-center"><i data-lucide="shield-check" class="w-8 h-8 mx-auto text-brand-400 mb-2"></i><p class="font-bold text-brand-700">Hubungi Agensi Anda jika ingin menambahkan cabang bisnis baru.</p></div>`;

            return `
                <div class="animate-fade-in glass border-4 border-brand-200 shadow-sm p-8 rounded-[2rem] max-w-3xl">
                    <h2 class="text-3xl font-black text-brand-900 mb-8 flex items-center gap-3"><i data-lucide="palette" class="w-8 h-8"></i> Personalisasi & Akun</h2>
                    ${formTambahKlien}
                    <div class="bg-white p-6 rounded-3xl border-4 border-brand-100 mb-6">
                        <h3 class="font-extrabold text-xl mb-4 text-slate-800">Pilih Warna Dasbor</h3>
                        <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
                            <button onclick="changeTheme('pink')" class="p-4 rounded-2xl font-bold text-white bg-[#ec4899] hover:opacity-90 border-4 ${currentTheme==='pink'?'border-slate-800 scale-105':'border-transparent'} transition-all">🌸 Pink Ceria</button>
                            <button onclick="changeTheme('blue')" class="p-4 rounded-2xl font-bold text-white bg-[#3b82f6] hover:opacity-90 border-4 ${currentTheme==='blue'?'border-slate-800 scale-105':'border-transparent'} transition-all">🌊 Biru Samudra</button>
                            <button onclick="changeTheme('green')" class="p-4 rounded-2xl font-bold text-white bg-[#22c55e] hover:opacity-90 border-4 ${currentTheme==='green'?'border-slate-800 scale-105':'border-transparent'} transition-all">🍃 Hijau Fresh</button>
                        </div>
                    </div>
                    <div class="bg-white p-6 rounded-3xl border-4 border-rose-100 mt-6">
                        <button onclick="handleLogout()" class="w-full bg-rose-50 text-rose-600 border-2 border-rose-200 px-6 py-3 rounded-2xl font-bold hover:bg-rose-500 hover:text-white transition-all btn-smooth flex justify-center items-center gap-2"><i data-lucide="log-out" class="w-5 h-5"></i> Keluar Akun (Logout)</button>
                    </div>
                </div>`;
        }

        function createNewClient() {
            if(loginRole !== 'admin') return;
            const input = document.getElementById('new-client-name'), name = input.value.trim();
            if(!name) return showToast('Tulis nama kliennya dong!', 'warning');
            const newId = 'klien' + Date.now();
            database[newId] = { name: `🏢 ${name}`, accounts: {}, feed: [], scheduled: [] };
            saveToFirestore(); updateCompanyDropdowns(); input.value = '';
            showToast(`Ruang Kerja "${name}" dibuat!`, 'success'); changeCompany(newId);
        }
    </script>
</body>
</html>
