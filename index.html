    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: linear-gradient(135deg, rgb(var(--color-brand-50)) 0%, rgb(var(--color-brand-100)) 100%);

        .color-tw { color: #000000; } .bg-tw { background-color: #000000; color: #ffffff;}
        .color-ig { background: radial-gradient(circle at 30% 107%, #fdf497 0%, #fdf497 5%, #fd5949 45%,#d6249f 60%,#285AEB 90%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .bg-ig { background: radial-gradient(circle at 30% 107%, #fdf497 0%, #fdf497 5%, #fd5949 45%,#d6249f 60%,#285AEB 90%); color: #ffffff;}

        .color-yt { color: #FF0000; } .bg-yt { background-color: #FF0000; color: #ffffff;}
        .color-tk { color: #000000; } .bg-tk { background-color: #000000; color: #ffffff;}
        .color-wa { color: #25D366; } .bg-wa { background-color: #25D366; color: #ffffff;}
        .color-tg { color: #24A1DE; } .bg-tg { background-color: #24A1DE; color: #ffffff;}
        .color-pt { color: #E60023; } .bg-pt { background-color: #E60023; color: #ffffff;}
        .color-th { color: #000000; } .bg-th { background-color: #000000; color: #ffffff;}

        .btn-smooth:active { transform: scale(0.95); transition: transform 0.1s; }

        /* Toast Popup Styling */
        #toast-container {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%); z-index: 9999;
            display: flex; flex-direction: column; gap: 10px; pointer-events: none;
        }
        .toast {
            padding: 12px 24px; border-radius: 50px; color: white; font-weight: 800; font-size: 14px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.2);
            animation: slideDownToast 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55) forwards, fadeOutToast 0.4s 3.5s forwards;
            pointer-events: auto; border: 2px solid rgba(255,255,255,0.2);
        }
        @keyframes slideDownToast { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeOutToast { from { opacity: 1; transform: translateY(0); } to { opacity: 0; transform: translateY(-20px); } }

        let activeTab = localStorage.getItem('sosialhub-activeTab') || 'dashboard';

        let isLoggedIn = localStorage.getItem('sosialhub-loggedIn') === 'true';
        let attachedMedia = false; 

        if (isLoggedIn) {
            document.getElementById('login-screen').style.display = 'none';
        }
        
        // Data Dummy Awal
        let database = {
            klien1: {
                name: '🏢 Perusahaan Pribadi', accounts: { facebook: 1, twitter: 0, instagram: 1, linkedin: 1, youtube: 0, tiktok: 1, whatsapp: 0, telegram: 0, pinterest: 0, threads: 0 },

                scheduled: []

        };

        async function saveToFirestore() {
            if (!isLoggedIn || !window.firebaseAuth.auth.currentUser) return;
            try {
                const uid = window.firebaseAuth.auth.currentUser.uid;
                const { db, doc, setDoc } = window.firebaseDb;
                await setDoc(doc(db, "agensi_data", uid), { data_klien: database });
                console.log("💾 Berhasil menyimpan ke Firestore");
            } catch (error) { console.error("Gagal simpan ke Firestore:", error); }
        }

        function toggleAuthView(view) {
            const loginView = document.getElementById('view-login'), registerView = document.getElementById('view-register');
            const title = document.getElementById('auth-title'), subtitle = document.getElementById('auth-subtitle');

            else { registerView.classList.add('hidden'); loginView.classList.remove('hidden'); title.innerText = 'Selamat Datang'; subtitle.innerText = 'Pintu masuk ke SosialHub'; }

        function switchLoginRole(role) {
            loginRole = role;
            const slider = document.getElementById('login-slider');
            const btnAdmin = document.getElementById('btn-role-admin'), btnClient = document.getElementById('btn-role-client');
            if (role === 'admin') { slider.style.transform = 'translateX(0)'; btnAdmin.classList.replace('text-brand-500', 'text-brand-900'); btnClient.classList.replace('text-brand-900', 'text-brand-500'); } 
            else { slider.style.transform = 'translateX(100%)'; btnAdmin.classList.replace('text-brand-900', 'text-brand-500'); btnClient.classList.replace('text-brand-500', 'text-brand-900'); }
        }

        async function processLoginSuccess(user, userName) {
            const { db, doc, getDoc, setDoc } = window.firebaseDb;
            const docRef = doc(db, "agensi_data", user.uid);
            const docSnap = await getDoc(docRef);

            if (docSnap.exists()) database = docSnap.data().data_klien;
            else { saveToFirestore(); } // Simpan default jika user baru

            updateCompanyDropdowns();
            const loginScreen = document.getElementById('login-screen');
            loginScreen.classList.add('opacity-0'); 
            
            setTimeout(() => {
                loginScreen.style.display = 'none'; 
                isLoggedIn = true;
                localStorage.setItem('sosialhub-loggedIn', 'true');
                localStorage.setItem('sosialhub-role', loginRole);
                showToast(`Selamat datang, ${userName}! 🎉`, 'success');
                
                // === LOGIKA ROLE-BASED ACCESS CONTROL (RBAC) ===
                const selDesktop = document.getElementById('company-selector');
                const selMobile = document.getElementById('mobile-company-selector');
                const lockIcon = document.getElementById('client-lock-icon');
                const mobLockIcon = document.getElementById('mobile-client-lock-icon');
                const chevronIcon = document.getElementById('company-chevron');

                if(loginRole === 'client') {
                    // Klien: Kunci akses ke 1 klien, disable dropdown, ubah style jadi terkunci
                    changeCompany(Object.keys(database)[0]);
                    selDesktop.disabled = true; selMobile.disabled = true;
                    
                    selDesktop.classList.add('bg-slate-50', 'text-slate-500', 'border-slate-200', 'pl-10');
                    selDesktop.classList.remove('hover:bg-brand-50', 'cursor-pointer');
                    selMobile.classList.add('bg-slate-50', 'text-slate-500', 'pl-8');
                    
                    lockIcon.classList.remove('hidden'); mobLockIcon.classList.remove('hidden');
                    chevronIcon.classList.add('hidden');
                    
                    // Keamanan ekstra: lempar ke dasbor jika buka billing
                    if(activeTab === 'billing') activeTab = 'dashboard';
                } else {
                    // Admin: Buka akses
                    localStorage.setItem('sosialhub-companyId', currentCompanyId);
                    selDesktop.disabled = false; selMobile.disabled = false;
                    
                    selDesktop.classList.remove('bg-slate-50', 'text-slate-500', 'border-slate-200', 'pl-10');
                    selDesktop.classList.add('hover:bg-brand-50', 'cursor-pointer');
                    selMobile.classList.remove('bg-slate-50', 'text-slate-500', 'pl-8');
                    
                    lockIcon.classList.add('hidden'); mobLockIcon.classList.add('hidden');
                    chevronIcon.classList.remove('hidden');
                }
                
                init(); 
            }, 500);
        }

        async function handleLogin(e) {
            e.preventDefault();
            const btn = document.getElementById('submit-login'); btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i>...'; btn.classList.add('pointer-events-none');
            try {
                const cred = await window.firebaseAuth.signInWithEmailAndPassword(window.firebaseAuth.auth, document.getElementById('login-email').value, document.getElementById('login-password').value);
                await processLoginSuccess(cred.user, cred.user.displayName || (loginRole === 'admin' ? 'Admin Agensi' : 'Klien'));
            } catch (err) {
                showToast("Gagal masuk! Cek email & sandi Anda.", 'error');
                btn.innerHTML = 'Masuk Dasbor <i data-lucide="arrow-right" class="w-5 h-5"></i>'; btn.classList.remove('pointer-events-none');
            }
        }

        async function handleRegister(e) {
            e.preventDefault();
            const btn = document.getElementById('submit-register'); btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i>...'; btn.classList.add('pointer-events-none');
            try {
                const cred = await window.firebaseAuth.createUserWithEmailAndPassword(window.firebaseAuth.auth, document.getElementById('register-email').value, document.getElementById('register-password').value);
                await window.firebaseAuth.updateProfile(cred.user, { displayName: document.getElementById('register-name').value });
                await window.firebaseDb.setDoc(window.firebaseDb.doc(window.firebaseDb.db, "agensi_data", cred.user.uid), { data_klien: database });
                showToast('Akun berhasil dibuat! Silakan masuk.', 'success');
                document.getElementById('login-email').value = document.getElementById('register-email').value;
                toggleAuthView('login');
            } catch (err) {
                showToast("Gagal mendaftar! Mungkin email sudah terpakai.", 'error');
                btn.innerHTML = 'Buat Akun Gratis <i data-lucide="user-plus" class="w-5 h-5"></i>'; btn.classList.remove('pointer-events-none');
            }
        }

        async function handleGoogleAuth() {
            try {
                const provider = new window.firebaseAuth.GoogleAuthProvider();
                showToast("Membuka Google...", "info");
                const result = await window.firebaseAuth.signInWithPopup(window.firebaseAuth.auth, provider);
                await processLoginSuccess(result.user, result.user.displayName);
            } catch (error) { showToast("Gagal login dengan Google.", 'error'); }
        }

        async function handleLogout() {
            try {
                if(window.firebaseAuth) await window.firebaseAuth.signOut(window.firebaseAuth.auth);
                localStorage.removeItem('sosialhub-loggedIn'); localStorage.removeItem('sosialhub-role'); localStorage.removeItem('sosialhub-activeTab');
                window.location.reload();
            } catch (e) { showToast('Gagal keluar.', 'error'); }
        }

        function updateCompanyDropdowns() {
            const selectorDesktop = document.getElementById('company-selector');
            const selectorMobile = document.getElementById('mobile-company-selector');
            selectorDesktop.innerHTML = ''; selectorMobile.innerHTML = '';

            for (const key in database) {
                const name = database[key].name || `🏢 ${key.toUpperCase()}`;
                selectorDesktop.add(new Option(name, key)); selectorMobile.add(new Option(name, key));
            }
            if(!database[currentCompanyId]) currentCompanyId = Object.keys(database)[0];
            selectorDesktop.value = currentCompanyId; selectorMobile.value = currentCompanyId;
        }

        function init() {
            if(!isLoggedIn) return; 
            updateCompanyDropdowns(); renderSidebar(); renderMobileNav(); renderApp();
        }

        function changeTheme(themeName) {
            document.documentElement.setAttribute('data-theme', themeName);
            localStorage.setItem('sosialhub-theme', themeName);
            showToast(`Tema berubah menjadi ${themeName}! 🎨`, 'success');
            if(activeTab === 'settings') renderApp();
        }

        function changeCompany(companyId) {
            currentCompanyId = companyId;
            localStorage.setItem('sosialhub-companyId', companyId); 
            document.getElementById('company-selector').value = companyId;
            document.getElementById('mobile-company-selector').value = companyId;
            attachedMedia = false; 
            showToast('Berpindah Ruang Kerja... 🚀', 'info');
            setTimeout(() => { renderApp(); }, 200);
        }

        function changeTab(tabId) {
            activeTab = tabId;
            localStorage.setItem('sosialhub-activeTab', tabId);
            renderSidebar(); renderMobileNav(); renderApp();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function showToast(message, type = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            let bgClass = 'bg-brand-900'; let icon = '🔔';
            if(type === 'success') { bgClass = 'bg-emerald-500'; icon = '✅'; }
            if(type === 'error') { bgClass = 'bg-rose-500'; icon = '❌'; }
            if(type === 'warning') { bgClass = 'bg-accent-400'; icon = '⚠️'; }
            if(type === 'info') { bgClass = 'bg-brand-500'; icon = '💡'; }

            toast.className = `toast ${bgClass}`;
            toast.innerHTML = `<span class="mr-2">${icon}</span> ${message}`;
            container.appendChild(toast);
            setTimeout(() => { toast.remove(); }, 4000);
        }

        function simulateMediaUpload() { attachedMedia = true; showToast('Foto dilampirkan! 📸', 'success'); renderApp(); }
        function removeMedia() { attachedMedia = false; renderApp(); }

        function handlePost(isSchedule = false) {
            const text = document.getElementById('post-textarea').value;
            if (!text.trim() && !attachedMedia) return showToast('Ketik sesuatu atau lampirkan media dulu ya! 😅', 'warning');

            const currentData = database[currentCompanyId];
            const activePlatforms = Object.keys(currentData.accounts).filter(k => currentData.accounts[k] > 0);
            
            if (activePlatforms.length === 0) return showToast('Belum ada akun tersambung. Ke menu Integrasi dulu yuk!', 'error');

            if (isSchedule) {
                showToast('Masuk ke antrean jadwal! 🗓️', 'success');
                currentData.scheduled.unshift({ id: Date.now(), platform: activePlatforms[0], text: text || 'Postingan Media', time: 'Besok' });
            } else {
                showToast('Menerbangkan postingan... 🚀', 'info');
                setTimeout(() => {
                    activePlatforms.forEach(plat => {
                        currentData.feed.unshift({ id: Date.now() + Math.random(), platform: plat, text: text, media: attachedMedia, time: 'Baru saja', status: 'Mengudara' });
                    });
                    attachedMedia = false; 
                    saveToFirestore(); 
                    showToast(`Sukses diposting ke ${activePlatforms.length} platform! 🎉`, 'success');
                    renderApp();
                }, 800);
            }
            if(!isSchedule) renderApp();
        }

        function simulateOAuth(platform) {
            const btn = document.getElementById(`btn-connect-${platform}`);
            if(btn) { btn.innerHTML = `<i class="fa-solid fa-circle-notch fa-spin"></i>`; btn.classList.add('pointer-events-none'); }

            if (platform === 'facebook' && typeof FB !== 'undefined') {
                FB.login(function(response) {
                    if (response.authResponse) {
                        database[currentCompanyId].accounts[platform] = (database[currentCompanyId].accounts[platform] || 0) + 1;
                        saveToFirestore(); showToast(`Akun FB terhubung resmi. 🔗`, 'success'); renderApp();
                    } else { showToast('Otorisasi dibatalkan.', 'warning'); renderApp(); }
                }, {scope: 'public_profile,pages_manage_posts'}); 
            } else {
                setTimeout(() => {
                    database[currentCompanyId].accounts[platform] = (database[currentCompanyId].accounts[platform] || 0) + 1;
                    saveToFirestore(); showToast(`Akun ${platformConfig[platform].name} terhubung. 🔗`, 'success'); renderApp();
                }, 1000);
            }
        }

        function removeAccount(platform) {
            database[currentCompanyId].accounts[platform] = 0; saveToFirestore();
            showToast(`Koneksi ${platformConfig[platform].name} diputus. 🔌`, 'warning'); renderApp();
        }

        function renderSidebar() {
            const navMenu = document.getElementById('nav-menu'); const navFooter = document.getElementById('nav-footer');
            navMenu.innerHTML = ''; navFooter.innerHTML = '';
            
            // FILTER ROLE
            let visibleTabs = tabs;
            if (loginRole === 'client') visibleTabs = tabs.filter(t => t.id !== 'billing');

            visibleTabs.forEach(tab => {
                const isActive = activeTab === tab.id;
                const activeClass = isActive ? 'bg-gradient-to-r from-brand-500 to-brand-600 text-white font-black shadow-lg shadow-brand-500/40 scale-105 border-none' : 'text-brand-900 font-extrabold hover:bg-brand-100 hover:text-brand-700 btn-smooth';
                const iconClass = isActive ? 'text-white' : 'text-brand-400';
                const badgeHtml = tab.badge ? `<span class="bg-gradient-to-r from-accent-400 to-yellow-400 text-white text-[10px] uppercase tracking-widest font-black px-2.5 py-0.5 rounded-full ml-auto shadow-sm">${tab.badge}</span>` : '';

                const html = `<button onclick="changeTab('${tab.id}')" class="w-full flex items-center px-4 py-3.5 rounded-2xl transition-all ${activeClass}"><div class="flex items-center gap-3"><i data-lucide="${tab.icon}" class="w-5 h-5 ${iconClass}"></i>${tab.label}</div>${badgeHtml}</button>`;
                if (tab.section === 'main') navMenu.innerHTML += html; else navFooter.innerHTML += html;
            });
            document.getElementById('header-title').innerText = tabs.find(t => t.id === activeTab).label;
        }

        function renderMobileNav() {
            const mNav = document.getElementById('mobile-nav'); mNav.innerHTML = '';
            
            // FILTER ROLE
            let mobileTabs = tabs.filter(t => t.id !== 'billing').slice(0, 5);
            if (loginRole === 'client') mobileTabs = mobileTabs.filter(t => t.id !== 'settings'); 

            mobileTabs.forEach(tab => {
                const isActive = activeTab === tab.id;
                const activeClass = isActive ? 'text-brand-600 scale-110 -translate-y-2' : 'text-slate-400 hover:text-brand-400';
                mNav.innerHTML += `<button onclick="changeTab('${tab.id}')" class="flex flex-col items-center p-2 transition-all duration-300 relative ${activeClass}">${isActive ? '<div class="absolute -top-3 w-1.5 h-1.5 bg-brand-500 rounded-full shadow-[0_0_8px_var(--color-brand-500)]"></div>' : ''}<i data-lucide="${tab.icon}" class="w-6 h-6 mb-1 ${isActive ? 'fill-brand-100' : ''}"></i><span class="text-[10px] font-extrabold">${tab.label.split(' ')[0]}</span></button>`;
            });
            lucide.createIcons();
        }

        function renderApp() {
            const contentDiv = document.getElementById('main-content');
            if(!database[currentCompanyId]) return; 
            
            if (activeTab === 'dashboard') contentDiv.innerHTML = getDashboardHTML();
            else if (activeTab === 'schedule') contentDiv.innerHTML = getScheduleHTML();
            else if (activeTab === 'analytics') contentDiv.innerHTML = getAnalyticsHTML();
            else if (activeTab === 'integrations') contentDiv.innerHTML = getIntegrationsHTML();
            else if (activeTab === 'billing') contentDiv.innerHTML = getBillingHTML();
            else if (activeTab === 'settings') contentDiv.innerHTML = getSettingsHTML();
            lucide.createIcons();
        }

                                <button onclick="handlePost(false)" class="flex-1 lg:flex-none flex items-center justify-center gap-2 bg-gradient-to-r from-brand-500 to-accent-400 text-white px-8 py-3.5 rounded-[1.5rem] font-black hover:from-brand-600 transition-all duration-300 shadow-[0_10px_25px_rgba(var(--color-brand-500),0.4)] btn-smooth text-lg">
                                    Posting <i data-lucide="rocket" class="w-5 h-5"></i>
                                </button>
                            </div>
                        </div>
                    </div>

                    <!-- Riwayat Feed -->
                    <div class="mt-4">
                        <h3 class="font-black text-2xl text-brand-900 mb-6 flex items-center gap-3"><i data-lucide="activity" class="w-8 h-8 text-brand-500"></i> Riwayat Publikasi</h3>
                        <div class="space-y-5">
                            ${data.feed.length > 0 ? data.feed.map(post => {
                                const cfg = platformConfig[post.platform];
                                return `
                                <div class="bg-white p-6 rounded-[2rem] border-4 border-brand-100 flex gap-5 hover:-translate-y-2 hover:shadow-[0_15px_40px_-10px_rgba(var(--color-brand-500),0.3)] transition-all duration-300 group relative overflow-hidden">
                                    <div class="absolute top-0 left-0 w-3 h-full ${cfg.bgClass}"></div>
                                    <div class="w-16 h-16 ${cfg.bgClass} rounded-2xl flex items-center justify-center flex-shrink-0 shadow-lg mt-1 group-hover:scale-110 group-hover:rotate-6 transition-transform border-4 border-white">
                                        <i class="${cfg.icon} text-3xl"></i>
                                    </div>
                                    <div class="flex-1 min-w-0 pl-2">
                                        <div class="flex flex-wrap justify-between items-start mb-3 gap-2">
                                            <p class="font-extrabold text-slate-500 text-sm flex items-center gap-2 bg-slate-50 px-3 py-1.5 rounded-xl border-2 border-slate-100">
                                                <span class="capitalize text-slate-800">${cfg.name}</span> <span class="w-1.5 h-1.5 bg-brand-300 rounded-full"></span> ${post.time}
                                            </p>
                                            <span class="text-xs bg-brand-100 text-brand-700 px-3 py-1.5 rounded-full font-black uppercase border-2 border-brand-200">${post.status}</span>
                                        </div>
                                        <p class="text-slate-800 font-bold text-lg leading-relaxed whitespace-pre-wrap">${post.text}</p>
                                        ${post.media ? `
                                            <div class="mt-4 rounded-2xl overflow-hidden shadow-md max-w-md border-4 border-brand-100">
                                                <img src="https://placehold.co/600x300/${document.documentElement.getAttribute('data-theme') === 'blue' ? 'eff6ff/3b82f6' : (document.documentElement.getAttribute('data-theme') === 'green' ? 'f0fdf4/22c55e' : 'FCE7F3/ec4899')}?text=📸+Gambar+Terlampir" class="w-full h-48 object-cover"/>
                                            </div>
                                        ` : ''}
                                    </div>
                                </div>`
                            }).join('') : `<div class="glass p-12 text-center rounded-[2.5rem]"><i data-lucide="ghost" class="w-16 h-16 text-brand-400 mx-auto mb-4 animate-bounce"></i><p class="font-black text-xl text-brand-600">Kosong melompong! Ayo buat postingan pertamamu.</p></div>`}
                        </div>
                    </div>
                </div>
            `;
        }

        function getScheduleHTML() {
            const sched = database[currentCompanyId].scheduled;
            return `
                <div class="animate-fade-in glass p-10 rounded-[2.5rem]">
                    <h2 class="text-4xl font-black text-brand-900 mb-3 tracking-tight">Jadwal Masa Depan 🗓️</h2>
                    <p class="text-brand-700 font-bold text-lg mb-10">Biar robot yang kerja, kamu tinggal santai.</p>
                    ${sched.length > 0 ? sched.map(s => `
                        <div class="p-6 border-4 border-brand-200 rounded-[2rem] mb-5 bg-white flex items-center gap-5 shadow-sm">
                            <div class="bg-brand-100 p-4 rounded-2xl text-brand-600"><i data-lucide="clock" class="w-8 h-8"></i></div>
                            <div>
                                <p class="font-black text-xl text-slate-800 mb-1">${s.text}</p>
                                <p class="text-base font-bold text-brand-600">Terjadwal untuk: <span class="capitalize">${s.platform}</span></p>
                            </div>
                        </div>
                    `).join('') : '<div class="text-center p-12 bg-white border-4 border-brand-200 border-dashed rounded-[2.5rem]"><p class="font-black text-xl text-brand-500">Belum ada antrean jadwal.</p></div>'}
                </div>
            `;
        }

        function getAnalyticsHTML() {
            return `
                <div class="animate-fade-in glass p-10 rounded-[2.5rem]">
                    <h2 class="text-4xl font-black text-brand-900 mb-3 tracking-tight">Pantau Angka 📈</h2>
                    <p class="text-brand-700 font-bold text-lg mb-10">Pertumbuhan audiens bulan ini.</p>
                    <div class="bg-white border-4 border-brand-200 rounded-[2.5rem] p-8 h-80 flex items-end justify-around gap-4 relative">
                        ${[40, 60, 30, 80, 50, 90, 100].map(h => `<div class="w-full bg-gradient-to-t from-brand-500 to-accent-400 rounded-t-2xl hover:opacity-80 transition-opacity" style="height: ${h}%"></div>`).join('')}
                    </div>
                </div>
            `;
        }

        function getIntegrationsHTML() {
            const accs = database[currentCompanyId].accounts;
            
            // HANYA ADMIN
            const magicLink = loginRole === 'admin' ? `
                <div class="bg-gradient-to-r from-brand-600 to-brand-400 p-8 rounded-[2.5rem] mb-8 text-white shadow-lg flex flex-col md:flex-row items-center justify-between gap-6 border-4 border-white relative overflow-hidden">
                    <div class="absolute -right-10 -top-10 opacity-20"><i data-lucide="wand-2" class="w-48 h-48"></i></div>
                    <div class="flex items-center gap-5 relative z-10">
                        <div class="bg-white/20 p-3 md:p-4 rounded-2xl backdrop-blur-sm flex-shrink-0"><i data-lucide="wand-2" class="w-8 h-8"></i></div>
                        <div>
                            <h3 class="text-2xl font-black mb-1">Magic Link Klien ✨</h3>
                            <p class="font-bold text-brand-50 text-sm md:text-base">Kirim link ini ke klien. Mereka bisa sambung akun sendiri tanpa perlu kasih password!</p>
                        </div>
                    </div>
                    <button onclick="showToast('Link berhasil disalin! 📋', 'success')" class="bg-white text-brand-700 px-6 py-3.5 rounded-2xl font-black hover:scale-105 transition-transform shadow-md flex items-center gap-2 flex-shrink-0 w-full md:w-auto justify-center btn-smooth relative z-10">
                        <i data-lucide="copy" class="w-5 h-5"></i> Salin Link
                    </button>
                </div>
            ` : '';

            return `
                <div class="animate-fade-in">
                    ${magicLink}
                    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
                        ${Object.keys(platformConfig).map(plat => {
                            const cfg = platformConfig[plat]; 
                            const count = accs[plat] || 0;
                            const isConn = count > 0;
                            return `
                                <div class="bg-white p-6 rounded-[2.5rem] border-4 ${isConn ? 'border-brand-400 shadow-[0_10px_20px_-10px_rgba(var(--color-brand-500),0.3)]' : 'border-brand-100'} flex flex-col items-center text-center relative overflow-hidden group hover:-translate-y-1 transition-all duration-300">
                                    ${isConn ? `<div class="absolute -right-4 -top-4 w-24 h-24 ${cfg.bgClass} opacity-20 rounded-full group-hover:scale-150 transition-transform duration-500"></div>` : ''}
                                    
                                    <div class="w-20 h-20 ${isConn ? cfg.bgClass : 'bg-slate-100 text-slate-400'} rounded-3xl flex items-center justify-center text-4xl shadow-lg mb-4 border-4 border-white transition-all relative z-10">
                                        <i class="${cfg.icon}"></i>
                                    </div>
                                    <h3 class="font-black text-xl text-brand-900 mb-1 relative z-10">${cfg.name}</h3>
                                    
                                    ${isConn ? `
                                        <p class="text-sm font-black text-emerald-600 bg-emerald-50 px-4 py-1.5 rounded-full mb-4 border-2 border-emerald-100 relative z-10">${count} Akun Tersambung ✅</p>
                                        <div class="w-full flex gap-2 relative z-10">
                                            <button id="btn-connect-${plat}" onclick="simulateOAuth('${plat}')" class="flex-1 py-3.5 bg-brand-50 text-brand-700 font-black rounded-[1.2rem] hover:bg-brand-100 border-2 border-brand-200 transition-all text-sm btn-smooth">+ Tambah</button>
                                            <button onclick="removeAccount('${plat}')" class="flex-1 py-3.5 bg-white text-rose-500 font-black rounded-[1.2rem] hover:bg-rose-500 hover:text-white border-2 border-rose-100 transition-all text-sm btn-smooth">Putus</button>
                                        </div>
                                    ` : `
                                        <p class="text-sm font-bold text-slate-400 bg-slate-50 px-4 py-1.5 rounded-full mb-4 border-2 border-slate-100 relative z-10">Belum Terhubung</p>
                                        <button id="btn-connect-${plat}" onclick="simulateOAuth('${plat}')" class="w-full py-3.5 bg-slate-800 text-white font-black rounded-[1.2rem] hover:bg-brand-500 hover:shadow-lg transition-all relative z-10 btn-smooth">Hubungkan</button>
                                    `}
                                </div>
                            `;
                        }).join('')}
                    </div>
                </div>
            `;
        }

        function getBillingHTML() {
            return `
                <div class="animate-fade-in flex flex-col items-center justify-center mt-4">
                    <div class="bg-gradient-to-br from-brand-600 to-accent-400 p-2 rounded-[3rem] shadow-[0_20px_50px_-15px_rgba(var(--color-brand-600),0.5)] max-w-lg w-full relative">
                        <div class="absolute -top-6 left-1/2 -translate-x-1/2 bg-slate-900 text-white px-6 py-2 rounded-full font-black tracking-widest uppercase text-sm border-4 border-white shadow-md">
                            Satu-Satunya Paket
                        </div>
                        <div class="bg-white p-10 pt-12 rounded-[2.6rem] text-center h-full flex flex-col items-center relative overflow-hidden">
                            <div class="w-24 h-24 bg-brand-50 text-brand-600 rounded-full flex items-center justify-center mb-6 shadow-inner border-4 border-brand-100 relative z-10">
                                <i data-lucide="crown" class="w-12 h-12"></i>
                                <div class="absolute top-0 right-0 w-6 h-6 bg-accent-400 rounded-full border-2 border-white animate-ping"></div>
                            </div>
                            <h2 class="text-4xl font-black text-brand-900 mb-2 relative z-10">Paket Agensi PRO 🔥</h2>
                            <p class="text-brand-600 font-extrabold text-lg mb-8 relative z-10">Satu harga. Tanpa batas. Tanpa pusing.</p>
                            
                            <div class="bg-slate-50 w-full p-6 rounded-3xl border-4 border-slate-100 mb-8 relative z-10 hover:border-brand-300 transition-colors">
                                <h3 class="text-5xl font-black text-slate-800 mb-1">Rp 150<span class="text-2xl text-slate-400">.000</span></h3>
                                <p class="text-slate-500 font-black uppercase tracking-wider text-sm">Per Bulan</p>
                            </div>

                            <ul class="text-left space-y-4 mb-10 w-full px-2 relative z-10">
                                <li class="flex items-center gap-4 font-extrabold text-slate-700 text-lg"><i data-lucide="check-circle-2" class="w-7 h-7 text-brand-500 flex-shrink-0"></i> Unlimited Akun Medsos</li>
                                <li class="flex items-center gap-4 font-extrabold text-slate-700 text-lg"><i data-lucide="check-circle-2" class="w-7 h-7 text-brand-500 flex-shrink-0"></i> Kelola Unlimited Klien</li>
                                <li class="flex items-center gap-4 font-extrabold text-slate-700 text-lg"><i data-lucide="check-circle-2" class="w-7 h-7 text-brand-500 flex-shrink-0"></i> Auto-Posting & Penjadwalan</li>
                            </ul>

                            <button onclick="showToast('Mengarahkan ke pembayaran... 💳', 'info')" class="w-full py-4 bg-slate-900 text-white font-black text-xl rounded-2xl hover:bg-brand-500 transition-all shadow-lg btn-smooth relative z-10">
                                Mulai Langganan
                            </button>
                        </div>
                    </div>
                </div>
            `;
        }

        function getSettingsHTML() {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            
            // HANYA ADMIN
            const formTambahKlien = loginRole === 'admin' ? `
                <div class="bg-white p-6 rounded-3xl border-4 border-brand-100 mb-6">
                    <h3 class="font-extrabold text-xl mb-2 text-slate-800">Tambah Ruang Klien Baru</h3>
                    <div class="flex gap-3">
                        <input type="text" id="new-client-name" class="flex-1 bg-brand-50 border-4 border-brand-100 rounded-2xl px-4 py-3 font-bold text-brand-900 outline-none focus:border-brand-500" placeholder="Nama Klien...">
                        <button onclick="createNewClient()" class="bg-brand-900 text-white px-6 py-3 rounded-2xl font-bold hover:bg-brand-500 btn-smooth">Buat Ruang</button>
                    </div>
                </div>
            ` : `
                <div class="bg-brand-50 p-6 rounded-3xl border-2 border-dashed border-brand-200 mb-6 text-center">
                    <i data-lucide="shield-check" class="w-8 h-8 mx-auto text-brand-400 mb-2"></i>
                    <p class="font-bold text-brand-700">Hubungi Agensi Anda jika ingin menambahkan cabang bisnis baru.</p>
                </div>
            `;

            return `
                <div class="animate-fade-in glass border-4 border-brand-200 shadow-sm p-8 rounded-[2rem] max-w-3xl">
                    <h2 class="text-3xl font-black text-brand-900 mb-8 flex items-center gap-3"><i data-lucide="palette" class="w-8 h-8"></i> Personalisasi & Akun</h2>
                    
                    ${formTambahKlien}

                    <div class="bg-white p-6 rounded-3xl border-4 border-brand-100 mb-6">
                        <h3 class="font-extrabold text-xl mb-4 text-slate-800">Pilih Warna Dasbor</h3>
                        <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
                            <button onclick="changeTheme('pink')" class="p-4 rounded-2xl font-bold text-white bg-[#ec4899] hover:opacity-90 border-4 ${currentTheme==='pink'?'border-slate-800 scale-105':'border-transparent'} transition-all">🌸 Pink Ceria</button>
                            <button onclick="changeTheme('blue')" class="p-4 rounded-2xl font-bold text-white bg-[#3b82f6] hover:opacity-90 border-4 ${currentTheme==='blue'?'border-slate-800 scale-105':'border-transparent'} transition-all">🌊 Biru Samudra</button>
                            <button onclick="changeTheme('green')" class="p-4 rounded-2xl font-bold text-white bg-[#22c55e] hover:opacity-90 border-4 ${currentTheme==='green'?'border-slate-800 scale-105':'border-transparent'} transition-all">🍃 Hijau Fresh</button>
                        </div>
                    </div>

                    <!-- Tombol Keluar / Logout -->
                    <div class="bg-white p-6 rounded-3xl border-4 border-rose-100 mt-6">
                        <h3 class="font-extrabold text-xl mb-2 text-rose-600">Sesi Akun</h3>
                        <p class="text-slate-500 font-bold mb-4">Keluar dari ruang kerja dan kembali ke Pintu Masuk.</p>
                        <button onclick="handleLogout()" class="bg-rose-50 text-rose-600 border-2 border-rose-200 px-6 py-3 rounded-2xl font-bold hover:bg-rose-500 hover:text-white transition-all btn-smooth flex items-center justify-center gap-2">
                            <i data-lucide="log-out" class="w-5 h-5"></i> Keluar (Logout)
                        </button>
                    </div>
                </div>
            `;
        }

        function createNewClient() {
            if(loginRole !== 'admin') return showToast('Akses ditolak!', 'error');
            const input = document.getElementById('new-client-name');
            const name = input.value.trim();
            if(!name) return showToast('Tulis nama kliennya dong!', 'warning');
            
            const newId = 'klien' + Date.now();
            database[newId] = {
                name: `🏢 ${name}`,
                accounts: { facebook: 0, twitter: 0, instagram: 0, linkedin: 0, youtube: 0, tiktok: 0, whatsapp: 0, telegram: 0, pinterest: 0, threads: 0 },
                feed: [], scheduled: []
            };

            saveToFirestore();
            updateCompanyDropdowns();
            input.value = '';
            showToast(`Ruang Kerja "${name}" dibuat!`, 'success');
            changeCompany(newId);
        }

        window.onload = () => {};
    </script>
</body>
</html>
